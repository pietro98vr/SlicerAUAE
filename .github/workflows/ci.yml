name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    name: Byte-compile the module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python sources
        run: |
          python -m py_compile \
            AUAE/AUAE.py \
            AUAE/AUAELib/*.py
      - name: Validate the batch template
        run: python -c "import json; json.load(open('AUAE/Resources/batch_template.json'))"
